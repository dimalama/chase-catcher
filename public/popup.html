<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>ChaseCatcher</title>
  <style>
    body {
      width: 260px;
      padding: 15px;
      font-family: Arial, sans-serif;
      background-color: #f8f9fa;
    }

    .title {
      font-size: 18px;
      font-weight: bold;
      text-align: center;
      margin-bottom: 15px;
      color: #2c3e50;
    }

    .icon {
      font-size: 24px;
      margin-right: 5px;
      color: #2ecc71;
    }

    button {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
      cursor: pointer;
      border-radius: 5px;
      font-weight: bold;
      transition: all 0.3s ease;
    }

    #startBtn {
      background-color: #2ecc71;
      color: white;
      border: none;
    }

    #startBtn:hover {
      background-color: #27ae60;
    }

    #stopBtn {
      background-color: #e74c3c;
      color: white;
      border: none;
      display: none;
    }

    #stopBtn:hover {
      background-color: #c0392b;
    }

    #status {
      margin-top: 12px;
      text-align: center;
      font-size: 14px;
      color: #7f8c8d;
      padding: 8px;
      border-radius: 4px;
      background-color: #fff;
    }

    #progressBar {
      display: none;
      margin-top: 10px;
      background: #ecf0f1;
      border-radius: 4px;
      height: 8px;
      overflow: hidden;
    }

    #progressFill {
      width: 0%;
      height: 100%;
      background: #2ecc71;
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    #offerCount {
      text-align: center;
      font-size: 12px;
      color: #7f8c8d;
      margin-top: 4px;
      min-height: 16px;
    }

    #statsDisplay {
      text-align: center;
      font-size: 12px;
      color: #95a5a6;
      margin-top: 8px;
      padding: 6px;
      background-color: #fff;
      border-radius: 4px;
      min-height: 16px;
    }
  </style>
</head>

<body>
  <div class="title">
    <span class="icon">🎯</span>Chase Catcher
  </div>
  <button id="startBtn">🎯 Start Catching</button>
  <button id="stopBtn">⏸ Stop</button>
  <div id="status">Ready to catch some rewards!</div>
  <div id="progressBar">
    <div id="progressFill"></div>
  </div>
  <div id="offerCount"></div>
  <div id="statsDisplay"></div>
  <script src="../dist/popup.js"></script>
</body>

</html>
